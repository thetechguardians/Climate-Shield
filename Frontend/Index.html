<!DOCTYPE html>

<html lang="en" class="dark">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <meta
        name="description"
        content="AI-powered climate monitoring dashboard with real-time weather threat visualization and intelligent alerts." />

    <meta
        name="theme-color"
        content="#020617" />

    <meta
        name="color-scheme"
        content="dark" />

    <title>
        Climate-Shield | Global Alert System
    </title>

    <!-- TAILWIND -->

    <link rel="stylesheet"
        href="./dist/output.css">

    <!-- CUSTOM CSS -->

    <link rel="stylesheet"
        href="style.css">

</head>

<body class="h-screen overflow-hidden font-sans bg-slate-950 text-white">

    <!-- HEADER -->

    <header
        class="glass-panel border-b border-slate-800 px-4 md:px-6 py-4 flex justify-between items-center z-50">

        <div class="flex items-center gap-3">

            <div
                class="bg-sky-500/10 p-3 rounded-2xl text-sky-400 text-xl">

                🛡️

            </div>

            <div>

                <h1
                    class="text-lg md:text-xl font-bold tracking-wide text-sky-400">

                    CLIMATE-SHIELD

                </h1>

                <p class="text-xs text-slate-300">

                    Extreme Weather Alert System

                </p>

            </div>

        </div>

        <div class="flex items-center gap-4">

            <div
                class="hidden lg:flex items-center gap-2 bg-slate-900/60 px-4 py-2 rounded-full border border-slate-800">

                <span class="live-dot"></span>

                <span class="text-sm text-slate-200">

                    Standalone Mode

                </span>

                <span
                    id="last-update"
                    class="text-xs text-slate-400">

                    Updated: Just now

                </span>

            </div>

            <button
                aria-label="Notifications"
                class="relative p-2 text-slate-300 hover:text-white transition-colors">

                <span class="text-lg">🔔</span>

                <span
                    id="alert-badge"
                    class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">

                    0

                </span>

            </button>

        </div>

    </header>

    <!-- MAIN -->

    <main
        class="flex h-[calc(100vh-81px)] flex-col md:flex-row overflow-hidden">

        <!-- SIDEBAR -->

        <aside
            class="w-full md:w-[400px] lg:w-[430px] flex flex-col border-r border-slate-800 glass-panel">

            <!-- STATS -->

            <section class="p-5 border-b border-slate-800">

                <div class="grid grid-cols-2 gap-4">

                    <article
                        class="bg-slate-900/50 rounded-2xl p-4 border border-slate-800">

                        <p
                            class="text-xs text-slate-300 uppercase tracking-wider mb-1">

                            Critical Alerts

                        </p>

                        <p
                            id="stat-critical"
                            class="text-2xl font-bold text-red-400">

                            0

                        </p>

                    </article>

                    <article
                        class="bg-slate-900/50 rounded-2xl p-4 border border-slate-800">

                        <p
                            class="text-xs text-slate-300 uppercase tracking-wider mb-1">

                            Total Monitored

                        </p>

                        <p
                            id="stat-total"
                            class="text-2xl font-bold text-white">

                            0

                        </p>

                    </article>

                </div>

            </section>

            <!-- SEARCH -->

            <section
                class="p-4 border-b border-slate-800 bg-slate-900/20">

                <h2
                    class="text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wide">

                    Targeted Analysis

                </h2>

                <form
                    id="search-form"
                    class="flex gap-2">

                    <input
                        type="text"
                        id="city-search"
                        aria-label="Search city"
                        autocomplete="off"
                        placeholder="Search a city..."
                        class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-sky-400" />

                    <button
                        type="submit"
                        id="search-btn"

                        class="bg-sky-500 text-slate-950 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-sky-400 transition-colors">

                        Search

                    </button>

                </form>

                <div
                    id="search-error"
                    class="hidden mt-2 text-xs text-red-400 items-center gap-1">

                    <span id="error-text"></span>

                </div>

            </section>

            <!-- FILTERS -->

            <section
                class="px-4 py-3 flex gap-2 border-b border-slate-800 overflow-x-auto no-scrollbar">

                <button
                    class="px-3 py-1.5 text-xs rounded-full bg-slate-700 text-white whitespace-nowrap">

                    All Threats

                </button>

                <button
                    class="px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-300 whitespace-nowrap">

                    Floods

                </button>

                <button
                    class="px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-300 whitespace-nowrap">

                    Heatwaves

                </button>

                <button
                    class="px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-300 whitespace-nowrap">

                    Hurricanes

                </button>

            </section>

            <!-- ALERTS -->

            <section
                id="alert-container"
                class="flex-1 overflow-y-auto p-4 space-y-3">

                <div
                    id="loading-alerts"
                    class="text-center text-slate-400 mt-10">

                    Initializing simulated streams...

                </div>

            </section>

        </aside>

        <!-- MAP -->

        <section
            class="relative flex-1 bg-slate-950">

            <!-- MAP CONTAINER -->

            <div
                id="map-container"
                class="w-full h-full flex items-center justify-center"
                role="application"
                aria-label="Global climate monitoring map">

                <button
                    id="load-map-btn"

                    class="
                        glass-panel
                        px-5 py-3
                        rounded-2xl
                        text-sm
                        font-semibold
                        border border-slate-700
                        text-sky-300
                    ">

                    🌍 Load Interactive Map

                </button>

            </div>

            <!-- LEGEND -->

            <aside
                class="absolute bottom-6 left-6 z-[1000] hidden md:block">

                <div
                    class="glass-panel p-4 rounded-2xl border border-slate-800 w-56">

                    <h3
                        class="text-sm font-semibold mb-3 border-b border-slate-800 pb-2">

                        Threat Legend

                    </h3>

                    <div class="space-y-2 text-sm">

                        <div class="flex items-center gap-2">

                            <span
                                class="w-3 h-3 rounded-full bg-red-500"></span>

                            <span class="text-slate-200">

                                Critical Threat

                            </span>

                        </div>

                        <div class="flex items-center gap-2">

                            <span
                                class="w-3 h-3 rounded-full bg-orange-500"></span>

                            <span class="text-slate-200">

                                High Warning

                            </span>

                        </div>

                        <div class="flex items-center gap-2">

                            <span
                                class="w-3 h-3 rounded-full bg-yellow-500"></span>

                            <span class="text-slate-200">

                                Advisory

                            </span>

                        </div>

                    </div>

                </div>

            </aside>

            <!-- CHAT BUTTON -->

            <button
                id="chatbot-toggle"

                class="
                    absolute
                    bottom-6
                    right-6
                    z-[1000]

                    bg-sky-500
                    text-slate-950

                    w-14 h-14

                    rounded-full

                    flex items-center justify-center

                    text-xl

                    shadow-lg
                ">

                💬

            </button>

        </section>

    </main>

    <!-- APP -->

    <script defer
        src="script.js">
    </script>

</body>

</html>
